<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实验室预约管理系统 — 宽柔中学</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
</head>
<body>

  <!-- 顶部栏 -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <a href="#dashboard">🔬 实验室预约系统</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="菜单">☰</button>
      <div id="userInfo"></div>
    </div>
  </header>

  <!-- 导航栏 -->
  <nav class="nav-bar" id="navBar">
    <div class="nav-inner" id="mainNav"></div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- 仪表板（公开首页） -->
    <section class="page-section" id="page-dashboard"></section>

    <!-- 登入页 -->
    <section class="page-section" id="page-login" style="display:none"></section>

    <!-- 时间表页 -->
    <section class="page-section" id="page-timetable" style="display:none"></section>

    <!-- 预约申请页（老师） -->
    <section class="page-section" id="page-booking" style="display:none"></section>

    <!-- 我的申请页（老师） -->
    <section class="page-section" id="page-my-bookings" style="display:none"></section>

    <!-- 审批管理页（管理员） -->
    <section class="page-section" id="page-admin-approval" style="display:none"></section>

    <!-- 预约管理页（管理员） -->
    <section class="page-section" id="page-admin-bookings" style="display:none"></section>

    <!-- 特殊占用管理页（管理员） -->
    <section class="page-section" id="page-admin-blocked" style="display:none"></section>

    <!-- 统计页（管理员） -->
    <section class="page-section" id="page-admin-stats" style="display:none"></section>

  </main>

  <!-- Toast 容器 -->
  <div id="toastContainer"></div>

  <!-- JavaScript -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/timetable.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 手机端汉堡菜单切换
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navBar').classList.toggle('open');
    });

    // 点击导航链接后自动关闭菜单
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('nav-link')) {
        document.getElementById('navBar').classList.remove('open');
      }
    });
  </script>

</body>
</html>
